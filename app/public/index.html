<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 30px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    h1 {
      color: #333;
      font-size: 28px;
    }
    
    .btn-add {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .btn-add:hover {
      background-color: #218838;
    }
    
    .status {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }
    
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .status.loading {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
    
    .table-wrapper {
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background-color: #667eea;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
    }
    
    td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      word-break: break-all;
    }
    
    tr:hover {
      background-color: #f5f5f5;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    
    .btn-edit {
      background-color: #ffc107;
      color: #333;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .btn-edit:hover {
      background-color: #e0a800;
    }
    
    .btn-delete {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .btn-delete:hover {
      background-color: #c82333;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
    }
    
    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-header h2 {
      color: #333;
      font-size: 22px;
    }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }
    
    .close-btn:hover {
      color: #333;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }
    
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    
    input:disabled {
      background-color: #f0f0f0;
      color: #999;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: space-between;
    }
    
    .modal-buttons-left {
      display: flex;
      gap: 10px;
    }
    
    .btn-submit {
      background-color: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .btn-submit:hover {
      background-color: #5568d3;
    }
    
    .btn-cancel {
      background-color: #6c757d;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .btn-cancel:hover {
      background-color: #5a6268;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      display: inline-block;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-content {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Database</h1>
      <button class="btn-add" onclick="openAddModal()">➕ Add New</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div class="table-wrapper" id="tableContainer" style="display: none;">
      <table id="resultsTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Record</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div id="status" class="status"></div>
      <form id="modalForm" onsubmit="handleSubmit(event)">
        <div id="formFields"></div>
        <div class="modal-buttons">
          <div class="modal-buttons-left">
            <button type="submit" class="btn-submit" id="submitBtn">Add Record</button>
            <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    let allData = [];
    let tableColumns = [];
    let editingId = null;
    let modalMode = 'add';

    function openAddModal() {
      modalMode = 'add';
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add New Record';
      document.getElementById('submitBtn').textContent = 'Add Record';
      loadFormFields();
      document.getElementById('modal').classList.add('active');
    }

    function openEditModal(id) {
      modalMode = 'edit';
      editingId = id;
      const record = allData.find(r => (r.ID === id || r.id === id));
      if (!record) {
        alert('Record not found');
        return;
      }
      
      document.getElementById('modalTitle').textContent = 'Edit Record';
      document.getElementById('submitBtn').textContent = 'Update Record';
      loadFormFields(record);
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      editingId = null;
      document.getElementById('modalForm').reset();
    }

    function loadFormFields(record = null) {
      const container = document.getElementById('formFields');
      container.innerHTML = '';
      
      // Only show Name field for editing, skip ID and EntryDate
      const fieldsToShow = ['Name'];
      
      fieldsToShow.forEach(col => {
        const formGroup = document.createElement('div');
        formGroup.className = 'form-group';
        // Handle both column name cases
        const value = record ? (record[col] || record[col.toLowerCase()] || '') : '';
        formGroup.innerHTML = `
          <label>${col}:</label>
          <input type="text" name="${col}" value="${value}" required>
        `;
        container.appendChild(formGroup);
      });
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      
      const columns = {};
      formData.forEach((value, key) => {
        if (value !== undefined && value !== '') {
          columns[key] = value;
        }
      });

      try {
        if (modalMode === 'add') {
          const response = await fetch('/api/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ columns })
          });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
          alert('Record added successfully!');
        } else {
          if (!editingId) throw new Error('No record selected for edit');
          const response = await fetch(`/api/update/${editingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ columns })
          });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
          alert('Record updated successfully!');
        }
        closeModal();
        fetchData();
      } catch (error) {
        alert(`Error: ${error.message}`);
      }
    }

    function deleteRecord(rowData) {
      const confirmMsg = allData.find(r => r.ID === rowData.ID || r.id === rowData.id);
      const displayName = confirmMsg ? (confirmMsg.Name || confirmMsg.name || confirmMsg.ID || confirmMsg.id) : (rowData.ID || rowData.id);
      
      if (!confirm(`Are you sure you want to delete "${displayName}"?`)) return;
      
      const recordId = rowData.ID || rowData.id;
      
      try {
        const response = fetch(`/api/delete/${recordId}`, { method: 'DELETE' });
        response.then(res => res.json()).then(result => {
          if (!result.success) throw new Error(result.error);
          alert('Record deleted!');
          fetchData();
        }).catch(error => {
          alert(`Error: ${error.message}`);
        });
      } catch (error) {
        alert(`Error: ${error.message}`);
      }
    }

    async function fetchData() {
      const statusDiv = document.getElementById('status');
      const tableContainer = document.getElementById('tableContainer');
      
      statusDiv.className = 'status loading';
      statusDiv.innerHTML = '<div class="loading-content"><div class="spinner"></div>Loading data...</div>';
      tableContainer.style.display = 'none';
      
      try {
        const response = await fetch('/api/query');
        const result = await response.json();
        
        if (result.success && result.data.length > 0) {
          allData = result.data;
          tableColumns = Object.keys(result.data[0]);
          displayTable(result.data);
          statusDiv.className = 'status success';
          statusDiv.textContent = `✓ ${result.message}`;
          tableContainer.style.display = 'block';
        } else if (result.success) {
          statusDiv.textContent = 'No data found';
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        statusDiv.className = 'status error';
        statusDiv.textContent = `✗ Error: ${error.message}`;
      }
    }
    
    function displayTable(data) {
      const thead = document.getElementById('tableHead');
      const tbody = document.getElementById('tableBody');
      
      thead.innerHTML = '';
      tbody.innerHTML = '';
      
      if (data.length === 0) return;
      
      const columns = Object.keys(data[0]);
      
      const headerRow = document.createElement('tr');
      columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headerRow.appendChild(th);
      });
      const actionTh = document.createElement('th');
      actionTh.textContent = 'Actions';
      headerRow.appendChild(actionTh);
      thead.appendChild(headerRow);
      
      data.forEach(row => {
        const tr = document.createElement('tr');
        columns.forEach(col => {
          const td = document.createElement('td');
          td.textContent = row[col] !== null ? row[col] : '(null)';
          tr.appendChild(td);
        });
        const actionTd = document.createElement('td');
        const rowId = row.ID || row.id;
        actionTd.innerHTML = `
          <div class="action-buttons">
            <button class="btn-edit" onclick="openEditModal(${rowId})">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteRecord(${JSON.stringify(row).replace(/"/g, '&quot;')})">🗑️</button>
          </div>
        `;
        tr.appendChild(actionTd);
        tbody.appendChild(tr);
      });
    }

    // Load initial data
    fetchData();
  </script>
</body>
</html>
