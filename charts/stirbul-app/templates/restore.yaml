apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sql-pitr-restore
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
                - name: TARGET_TIME
                  value: "2026-03-10 16:15:00" 
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  echo "--- Starting Clean PITR Restore ---"
                  
                  # We use a Here-Doc to keep the SQL syntax clean and avoid shell-injection glitches
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -v TargetTime="$TARGET_TIME" -d master << 'EOF'
                  SET NOCOUNT ON;
                  DECLARE @TargetTime DATETIME = '$(TargetTime)';
                  DECLARE @FullBackup NVARCHAR(400), @DBName NVARCHAR(128), @FullFinishDate DATETIME, @Sql NVARCHAR(MAX);

                  -- Detect Latest Backup
                  SELECT TOP 1 
                      @FullBackup = bmf.physical_device_name, 
                      @FullFinishDate = bs.backup_finish_date, 
                      @DBName = bs.database_name
                  FROM msdb.dbo.backupset bs 
                  JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                  WHERE bs.type = 'D' 
                  ORDER BY bs.backup_finish_date DESC;

                  IF @FullBackup IS NULL BEGIN PRINT 'ERROR: No backups found.'; RETURN; END
                  PRINT '--- Detected DB: ' + @DBName + ' ---';

                  -- Restore Full (Keep in NORECOVERY)
                  SET @Sql = 'ALTER DATABASE [' + @DBName + '] SET SINGLE_USER WITH ROLLBACK IMMEDIATE; 
                              RESTORE DATABASE [' + @DBName + '] FROM DISK = ''' + @FullBackup + ''' WITH REPLACE, NORECOVERY;';
                  EXEC(@Sql);

                  -- Play Log Chain
                  DECLARE @LogPath NVARCHAR(400);
                  DECLARE log_cursor CURSOR FOR 
                    SELECT bmf.physical_device_name FROM msdb.dbo.backupset bs 
                    JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                    WHERE bs.database_name = @DBName AND bs.type = 'L' 
                    AND bs.backup_finish_date > @FullFinishDate 
                    AND bs.backup_start_date <= @TargetTime;

                  OPEN log_cursor; FETCH NEXT FROM log_cursor INTO @LogPath;
                  WHILE @@FETCH_STATUS = 0 BEGIN
                      PRINT 'Applying Log: ' + @LogPath;
                      SET @Sql = 'RESTORE LOG [' + @DBName + '] FROM DISK = ''' + @LogPath + ''' WITH NORECOVERY;';
                      EXEC(@Sql); 
                      FETCH NEXT FROM log_cursor INTO @LogPath;
                  END
                  CLOSE log_cursor; DEALLOCATE log_cursor;

                  -- Finalize
                  PRINT 'Finalizing Recovery to: ' + CAST(@TargetTime AS VARCHAR);
                  SET @Sql = 'RESTORE DATABASE [' + @DBName + '] WITH RECOVERY, STOPAT = ''' + CAST(@TargetTime AS VARCHAR) + ''';';
                  EXEC(@Sql);
                  
                  SET @Sql = 'ALTER DATABASE [' + @DBName + '] SET MULTI_USER;';
                  EXEC(@Sql);

                  PRINT '--- SUCCESS: Database Restored ---';
                  
                  -- Verification: List Tables
                  PRINT '--- Restored Tables List ---';
                  SET @Sql = 'SELECT name FROM [' + @DBName + '].sys.tables;';
                  EXEC(@Sql);
                  EOF