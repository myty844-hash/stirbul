apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-daily-reset
spec:
  # Reset every night at midnight
  schedule: "0 0 * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                {{- if ne $key "SQLSERVER_QUERY" }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
                {{- end }}
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  
                  echo "--- Step 1: Executing Database Restore ---"
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "SET NOCOUNT ON;
                   DECLARE @LatestPath NVARCHAR(400);
                   
                   -- 1. Find the latest full backup path from MSDB history
                   SELECT TOP 1 @LatestPath = bmf.physical_device_name
                   FROM msdb.dbo.backupset bs
                   JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                   WHERE bs.database_name = 'amitai' AND bs.type = 'D'
                   ORDER BY bs.backup_finish_date DESC;

                   IF @LatestPath IS NULL 
                   BEGIN
                     RAISERROR('CRITICAL ERROR: No backup history found for database [amitai]!', 16, 1);
                     RETURN;
                   END

                   PRINT 'RESTORING FROM FILE: ' + @LatestPath;

                   -- 2. Force disconnect users only if the database currently exists
                   IF EXISTS (SELECT name FROM sys.databases WHERE name = 'amitai')
                   BEGIN
                        PRINT 'Database exists. Dropping active connections...';
                        ALTER DATABASE [amitai] SET SINGLE_USER WITH ROLLBACK IMMEDIATE;
                   END

                   -- 3. Perform the Restore (using REPLACE to overwrite current data)
                   PRINT 'Starting RESTORE DATABASE...';
                   RESTORE DATABASE [amitai] FROM DISK = @LatestPath WITH REPLACE, RECOVERY;
                   
                   -- 4. Bring database back to multi-user mode
                   ALTER DATABASE [amitai] SET MULTI_USER;
                   PRINT '--- RESTORE COMPLETED SUCCESSFULLY ---';"

                  echo "--- Step 2: Final Data Verification ---"
                  # This runs the query to prove the data is back
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d amitai -Q "SET NOCOUNT ON; SELECT TOP 1 * FROM dbo.amitai;"
          
          restartPolicy: OnFailure