apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sql-pitr-restore
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
                - name: TARGET_TIME
                  value: "2026-03-10 16:15:00" 
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  echo "--- Starting Dynamic PITR Restore ---"
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "SET NOCOUNT ON;
                   DECLARE @TargetTime DATETIME = '$TARGET_TIME';
                   DECLARE @FullBackup NVARCHAR(400);
                   DECLARE @DBName NVARCHAR(128);
                   DECLARE @FullFinishDate DATETIME;

                   -- 1. Get the latest Full Backup path from MSDB
                   SELECT TOP 1 
                        @FullBackup = bmf.physical_device_name,
                        @FullFinishDate = bs.backup_finish_date,
                        @DBName = bs.database_name
                   FROM msdb.dbo.backupset bs
                   JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                   WHERE bs.type = 'D' 
                   ORDER BY bs.backup_finish_date DESC;

                   IF @FullBackup IS NULL 
                   BEGIN
                     RAISERROR('No backups found in history!', 16, 1);
                     RETURN;
                   END

                   PRINT 'Detected Database: [' + @DBName + ']';
                   PRINT 'Restoring from: ' + @FullBackup;

                   -- 2. Kick users from the detected DB
                   DECLARE @Sql NVARCHAR(MAX) = 'IF EXISTS (SELECT name FROM sys.databases WHERE name = ''' + @DBName + ''') 
                        ALTER DATABASE [' + @DBName + '] SET SINGLE_USER WITH ROLLBACK IMMEDIATE;';
                   EXEC sp_executesql @Sql;

                   -- 3. Restore Full
                   SET @Sql = 'RESTORE DATABASE [' + @DBName + '] FROM DISK = ''' + @FullBackup + ''' WITH REPLACE, NORECOVERY;';
                   EXEC sp_executesql @Sql;

                   -- 4. Apply Logs
                   DECLARE log_cursor CURSOR FOR
                   SELECT bmf.physical_device_name
                   FROM msdb.dbo.backupset bs
                   JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                   WHERE bs.database_name = @DBName 
                   AND bs.type = 'L'
                   AND bs.backup_finish_date > @FullFinishDate
                   AND bs.backup_start_date <= @TargetTime
                   ORDER BY bs.backup_finish_date ASC;

                   DECLARE @LogPath NVARCHAR(400);
                   OPEN log_cursor;
                   FETCH NEXT FROM log_cursor INTO @LogPath;

                   WHILE @@FETCH_STATUS = 0
                   BEGIN
                       PRINT 'Applying Log: ' + @LogPath;
                       SET @Sql = 'RESTORE LOG [' + @DBName + '] FROM DISK = ''' + @LogPath + ''' WITH NORECOVERY;';
                       EXEC sp_executesql @Sql;
                       FETCH NEXT FROM log_cursor INTO @LogPath;
                   END
                   CLOSE log_cursor;
                   DEALLOCATE log_cursor;

                   -- 5. Final Recovery
                   PRINT 'Finalizing recovery for [' + @DBName + '] to STOPAT = ' + CAST(@TargetTime AS VARCHAR);
                   SET @Sql = 'RESTORE DATABASE [' + @DBName + '] WITH RECOVERY, STOPAT = ''' + CAST(@TargetTime AS VARCHAR) + ''';';
                   EXEC sp_executesql @Sql;

                   SET @Sql = 'ALTER DATABASE [' + @DBName + '] SET MULTI_USER;';
                   EXEC sp_executesql @Sql;
                   PRINT '--- PITR COMPLETE FOR ' + @DBName + ' ---';"
          restartPolicy: OnFailure