apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-daily-reset
spec:
  schedule: "0 0 * * *" 
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                {{- if ne $key "SQLSERVER_QUERY" }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
                {{- end }}
              command: ["/bin/bash", "-c"]
args:
                - |
                  set -e
                  
                  echo "--- Step 1: Running Restore Script ---"
                  # We use a single sqlcmd call. If this fails, 'set -e' will stop the pod.
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "SET NOCOUNT ON;
                   DECLARE @LatestPath NVARCHAR(400);
                   
                   -- 1. Find the backup
                   SELECT TOP 1 @LatestPath = bmf.physical_device_name
                   FROM msdb.dbo.backupset bs
                   JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id
                   WHERE bs.database_name = 'amitai' AND bs.type = 'D'
                   ORDER BY bs.backup_finish_date DESC;

                   IF @LatestPath IS NULL 
                   BEGIN
                     RAISERROR('CRITICAL: No backup found in MSDB history!', 16, 1);
                     RETURN;
                   END

                   PRINT 'RESTORING FROM: ' + @LatestPath;

                   -- 2. Kick users and restore
                   ALTER DATABASE [amitai] SET SINGLE_USER WITH ROLLBACK IMMEDIATE;
                   RESTORE DATABASE [amitai] FROM DISK = @LatestPath WITH REPLACE, RECOVERY;
                   ALTER DATABASE [amitai] SET MULTI_USER;
                   
                   PRINT 'RESTORE COMPLETED SUCCESSFULLY';"

                  echo "--- Step 2: Verification ---"
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d amitai -Q "SELECT TOP 1 * FROM dbo.amitai;"
          restartPolicy: OnFailure