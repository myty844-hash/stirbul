apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-site
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: stirbul-site
  template:
    metadata:
      labels:
        app: stirbul-site
    spec:
      containers:
        - name: stirbul-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}