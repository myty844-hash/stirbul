apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sql-log-backup
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  echo "--- Running Log Backup for All User DBs ---"
                  
                  /opt/mssql-tools/bin/sqlcmd -b -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "EXECUTE [dbo].[DatabaseBackup] 
                    @Databases = 'USER_DATABASES', 
                    @Directory = 'C:\Backups', 
                    @BackupType = 'LOG', 
                    @Verify = 'Y', 
                    @CleanupTime = 24, -- Deletes logs older than 24h
                    @LogToTable = 'Y'"