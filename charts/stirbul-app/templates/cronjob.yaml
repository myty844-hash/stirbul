apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sql-full-enforcer
spec:
  schedule: "0 0 * * *" # Daily Full Backup
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  
                  echo "--- Step 1: Forcing FULL Recovery on ALL Databases ---"
                  # This T-SQL loop finds every database that isn't a system DB and fixes its mode
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "DECLARE @sql NVARCHAR(MAX) = '';
                   SELECT @sql += 'ALTER DATABASE [' + name + '] SET RECOVERY FULL; ' 
                   FROM sys.databases WHERE name NOT IN ('master','model','msdb','tempdb');
                   EXEC sp_executesql @sql;"

                  echo "--- Step 2: Ensuring Folders & Maintenance Tools ---"
                  curl -sL https://ola.hallengren.com/scripts/MaintenanceSolution.sql -o /tmp/ola.sql
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -i /tmp/ola.sql

                  echo "--- Step 3: Running FULL Backup for Everything ---"
                  /opt/mssql-tools/bin/sqlcmd -S "$SQLSERVER_HOST,$SQLSERVER_PORT" -U "$SQLSERVER_USER" -P "$SQLSERVER_PASSWORD" -d master -Q \
                  "EXECUTE [dbo].[DatabaseBackup] 
                    @Databases = 'USER_DATABASES', 
                    @Directory = 'C:\Backups', 
                    @BackupType = 'FULL', 
                    @Verify = 'Y',
                    @LogToTable = 'Y'"