apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sql-backup
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sql-executor
              image: "mcr.microsoft.com/mssql-tools:latest"
              env:
                {{- range $key, $val := .Values.env }}
                {{- if ne $key "SQLSERVER_QUERY" }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
                {{- end }}
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  
                  echo "Step 1: Installing Ola Hallengren Maintenance Solution..."
                  curl -sL https://ola.hallengren.com/scripts/MaintenanceSolution.sql -o /tmp/ola.sql
                  
                  # Installing to 'master'
                  /opt/mssql-tools/bin/sqlcmd \
                    -S "$SQLSERVER_HOST,$SQLSERVER_PORT" \
                    -U "$SQLSERVER_USER" \
                    -P "$SQLSERVER_PASSWORD" \
                    -d master -i /tmp/ola.sql

                  echo "Step 2: Executing FULL Backup to C:\Backups..."
                  # Note: Using 'C:\Backups' as a Windows path and enabling @LogToTable
                  /opt/mssql-tools/bin/sqlcmd \
                    -S "$SQLSERVER_HOST,$SQLSERVER_PORT" \
                    -U "$SQLSERVER_USER" \
                    -P "$SQLSERVER_PASSWORD" \
                    -d master -Q \
                  "EXECUTE [dbo].[DatabaseBackup] 
                    @Databases = 'USER_DATABASES', 
                    @Directory = 'C:\Backups', 
                    @BackupType = 'FULL', 
                    @Verify = 'Y',
                    @LogToTable = 'Y'"

                  echo "Step 3: Verification Check..."
                  # This query checks if any success was logged in the last 5 minutes
                  LOG_CHECK=$(/opt/mssql-tools/bin/sqlcmd \
                    -S "$SQLSERVER_HOST,$SQLSERVER_PORT" \
                    -U "$SQLSERVER_USER" \
                    -P "$SQLSERVER_PASSWORD" \
                    -d master -h -1 -Q "SET NOCOUNT ON; SELECT TOP 1 DatabaseName FROM dbo.CommandLog WHERE StartTime > DATEADD(mi, -5, GETDATE()) AND ErrorNumber = 0")

                  if [ -z "$LOG_CHECK" ]; then
                    echo "FATAL ERROR: No successful backup log found in master.dbo.CommandLog!"
                    exit 1
                  else
                    echo "Success: Backup confirmed for database: $LOG_CHECK"
                  fi
          restartPolicy: OnFailure