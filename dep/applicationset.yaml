apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: stirbul-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: stirbul-app
    spec:
      project: default
      source:
        repoURL: https://github.com/myty844-hash/stirbul
        targetRevision: main
        path: .
      destination:
        server: '{{ url }}'
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
