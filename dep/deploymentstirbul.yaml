apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirbul-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stirbul-site
  template:
    metadata:
      labels:
        app: stirbul-site
    spec:
      containers:
        - name: stirbul-web
          image: stirbul-sql-site:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SQLSERVER_HOST
              value: "10.100.102.94"
            - name: SQLSERVER_PORT
              value: "1433"
            - name: SQLSERVER_USER
              value: "sa"
            - name: SQLSERVER_PASSWORD
              value: "YourStrongPassword123!"
            - name: SQLSERVER_QUERY
              value: "SELECT TOP 5 * FROM amitai"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: stirbul-service
spec:
  selector:
    app: stirbul-site
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30084
  type: NodePort
