apiVersion: apps/v1
kind: Deployment
metadata:
  name: cute-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cute-app
  template:
    metadata:
      labels:
        app: cute-app
    spec:
      containers:
        - name: hello-container
          image: nikibiki12/hello:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: cute-service
spec:
  selector:
    app: cute-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30084
  type: NodePort
