apiVersion: apps/v1
kind: Deployment
metadata:
  name: cute-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cute-app
  template:
    metadata:
      labels:
        app: cute-app
    spec:
      containers:
        - name: hello-container
          image: nikibiki12/hello:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cute-service
spec:
  selector:
    app: cute-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30084
  type: NodePort
